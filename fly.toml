app = 'lubook'
primary_region = 'gru'
console_command = '/rails/bin/rails console'

[env]
  PORT = "80"
  RAILS_LOG_TO_STDOUT = "1"

[build]

[deploy]
  release_command = './bin/rails db:prepare'

[processes]
  app = './bin/thrust ./bin/rails server'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false
    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[mounts]]
  source = 'lubook_storage'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024